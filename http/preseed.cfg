### language, country, and locale configuration
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i debian-installer/locale string en_US.UTF-8

### keyboard configuration
d-i keyboard-configuration/xkb-keymap select us
d-i console-setup/ask_detect boolean false
d-i console-setup/layoutcode string us
d-i console-setup/modelcode string pc105

### automatic network interface detection
d-i netcfg/choose_interface select auto

### hostname and domain configuration
d-i netcfg/get_hostname string debian
d-i netcfg/get_domain string

### Debian mirror configuration
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### root password
d-i passwd/root-password password root
d-i passwd/root-password-again password root

### main user creation
d-i passwd/user-fullname string debian
d-i passwd/username string debian
d-i passwd/user-password password ilovecoconutwater
d-i passwd/user-password-again password ilovecoconutwater

### time and clock configuration
d-i clock-setup/utc boolean true
d-i time/zone string America/New_York
d-i clock-setup/ntp boolean true

### automatic LVM partitioning
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-auto/choose_recipe select atomic

### remove existing logical volumes and RAID arrays
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true

### confirm partitioning operations
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-md/confirm boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### do not use CD as an APT source
d-i apt-setup/cdrom/set-first boolean false

### do not launch tasksel (package group selection)
d-i pkgsel/run_tasksel boolean false

### additional packages to install
d-i pkgsel/include string openssh-server sudo

### install GRUB on /dev/sda
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string /dev/sda

### reboot after installation
d-i finish-install/reboot_in_progress note

### commands to execute at the end of installation
d-i preseed/late_command string \
  apt-install sudo; \
  echo "debian ALL=(ALL:ALL) NOPASSWD: ALL" > /target/etc/sudoers.d/debian;
  in-target chmod 0440 /etc/sudoers.d/debian;
